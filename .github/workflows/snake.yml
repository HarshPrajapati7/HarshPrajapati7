name: Generate Pac-Man / Snake Animation

on:
  schedule:
    # Runs automatically every 12 hours
    - cron: "0 */12 * * *" 
  
  # Allows you to run the action manually from the Actions tab
  workflow_dispatch:
  
  # Runs on every push to the main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate the SVG files
        # Using the standard Platane/snk generator
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Outputting the exact file names your README is looking for
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg?palette=github-dark

      - name: Push to the 'output' branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
